name: NSE_EDMS
version: "2"

services:
    db:
        image: postgres:16
        container_name: postgres_database
        environment:
            POSTGRES_USER: ${PG_USER}
            POSTGRES_PASSWORD: ${PG_PASSWORD}
            POSTGRES_DB: ${PG_DB}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
        volumes:
            - pgdata:/var/lib/postgresql/data

    edms:
        image: zinoxtech/nse_edms:v2
        container_name: edms_software
        ports:
            - "${APP_PORT:-8080}:8080"
        environment:
            - EDMS_DEV=false
        volumes:
            - edms_data:${EDMS_DATA_PATH}
            - edms_logs:${EDMS_LOGS_PATH}
            - ./config/custom.conf:${EDMS_CONF_PATH}/conf.d/custom.conf:ro
        depends_on:
            db:
                condition: service_healthy

    nginx:
        image: nginx:alpine
        container_name: nginx_proxy
        ports:
            - "80:80"
            - "443:443"
        environment:
            - DOMAIN=${DOMAIN_NAME}
            - CERT_NAME=${DOMAIN_NAME}
            - UPSTREAM=edms
            - APP_PORT=${APP_PORT:-8080}
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
            - ./certbot/conf:/etc/letsencrypt:ro
            - ./certbot/www:/var/www/certbot:ro
        command: /bin/sh -c "envsubst '\$DOMAIN \$CERT_NAME \$UPSTREAM \$APP_PORT' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"

    certbot:
        image: certbot/certbot
        container_name: certbot_service
        volumes:
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot

volumes:
    pgdata:
    edms_data:
    edms_logs:
